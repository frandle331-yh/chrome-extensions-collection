<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 280px; font-family: system-ui, -apple-system, sans-serif; padding: 16px; background: #1e1e2e; color: #cdd6f4; }
    h1 { font-size: 16px; font-weight: 700; color: #89b4fa; margin-bottom: 8px; }
    p { font-size: 13px; color: #a6adc8; line-height: 1.5; margin-bottom: 12px; }
    .features { font-size: 12px; color: #a6adc8; }
    .features div { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .features .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #a6e3a1; }
    .dot.blue { background: #89b4fa; }
    .dot.purple { background: #cba6f7; }
    .dot.orange { background: #fab387; }
    .dot.pink { background: #f38ba8; }
  </style>
</head>
<body>
  <h1>JSONView</h1>
  <p>Navigate to any JSON URL or API endpoint. JSON will be auto-formatted with syntax highlighting.</p>
  <div class="features">
    <div><span class="dot green"></span> Collapsible tree view</div>
    <div><span class="dot blue"></span> Syntax highlighting</div>
    <div><span class="dot purple"></span> Search keys & values</div>
    <div><span class="dot orange"></span> Copy formatted JSON</div>
    <div><span class="dot pink"></span> Dark theme</div>
  </div>
</body>
</html>
