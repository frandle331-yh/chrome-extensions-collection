<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Quick Note - Screenshot</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 800px; background: #f0f4f8; display: flex; align-items: center; justify-content: center; font-family: system-ui, -apple-system, sans-serif; }
.container { display: flex; gap: 48px; align-items: center; }
.popup-frame { background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); width: 380px; height: 460px; display: flex; flex-direction: column; overflow: hidden; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
.header h1 { font-size: 16px; color: #f59e0b; }
.header-actions { display: flex; gap: 6px; }
.header-actions button { background: none; border: 1px solid #e2e8f0; border-radius: 6px; padding: 4px 8px; font-size: 13px; cursor: pointer; }
.url-bar { background: #f8fafc; padding: 8px 16px; font-size: 11px; color: #64748b; border-bottom: 1px solid #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.url-bar .icon { margin-right: 4px; }
textarea { flex: 1; border: none; padding: 14px 16px; font-size: 13px; line-height: 1.7; color: #0f172a; resize: none; font-family: system-ui, -apple-system, sans-serif; outline: none; }
.footer { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-top: 1px solid #e2e8f0; font-size: 12px; flex-shrink: 0; }
.status { color: #059669; font-weight: 500; }
.all-notes-btn { background: none; border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: #334155; }
.feature-panel { width: 440px; }
.feature-panel h2 { font-size: 22px; color: #1e293b; margin-bottom: 24px; font-weight: 600; }
.features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.feature-card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.feature-card .icon { font-size: 24px; margin-bottom: 8px; }
.feature-card h3 { font-size: 13px; color: #f59e0b; margin-bottom: 4px; }
.feature-card p { font-size: 11px; color: #64748b; line-height: 1.5; }
</style></head><body>
<div class="container">
  <div class="popup-frame">
    <div class="header">
      <h1>📝 QuickNote</h1>
      <div class="header-actions">
        <button title="Export">⤓</button>
        <button title="Delete">🗑</button>
      </div>
    </div>
    <div class="url-bar"><span class="icon">🔗</span> https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global...</div>
    <textarea>
## Array.prototype.map() メモ

- コールバック関数の引数: (element, index, array)
- 元の配列は変更されない（immutable）
- undefined を返すと sparse array になるので注意
- flatMap() と組み合わせると便利

TODO: パフォーマンス比較を書く
  → for loop vs map vs forEach</textarea>
    <div class="footer">
      <span class="status">✓ Saved</span>
      <button class="all-notes-btn">All Notes (12)</button>
    </div>
  </div>
  <div class="feature-panel">
    <h2>ページに紐づくメモを<br>サッと記録 📌</h2>
    <div class="features-grid">
      <div class="feature-card"><div class="icon">🔗</div><h3>URL連動</h3><p>ページごとにメモを自動管理。再訪問で自動復元。</p></div>
      <div class="feature-card"><div class="icon">💾</div><h3>自動保存</h3><p>入力するたびに即座に保存。データ損失の心配なし。</p></div>
      <div class="feature-card"><div class="icon">📑</div><h3>一覧表示</h3><p>全ノートを一覧で確認。ワンクリックでページに遷移。</p></div>
      <div class="feature-card"><div class="icon">📤</div><h3>エクスポート</h3><p>全ノートをMarkdownファイルとしてエクスポート。</p></div>
    </div>
  </div>
</div>
</body></html>
