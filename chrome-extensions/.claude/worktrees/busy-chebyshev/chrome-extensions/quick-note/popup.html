<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>QuickNote</h1>
    <div class="header-actions">
      <button id="export" title="Export All Notes">&#8615;</button>
      <button id="delete" title="Delete This Note">&#128465;</button>
    </div>
  </div>
  <div class="url-bar" id="url-bar"></div>
  <textarea id="note" placeholder="Write your note here..."></textarea>
  <div class="footer">
    <span id="status"></span>
    <button id="all-notes">All Notes (<span id="count">0</span>)</button>
  </div>
  <div id="notes-list" style="display:none">
    <div class="list-header">
      <span>All Notes</span>
      <button id="back-to-note">&times;</button>
    </div>
    <div id="notes-items"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
