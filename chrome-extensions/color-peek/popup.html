<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>ColorPeek</h1>
    <div class="header-actions">
      <select id="format">
        <option value="hex">HEX</option>
        <option value="rgb">RGB</option>
        <option value="hsl">HSL</option>
      </select>
      <button id="refresh" title="Re-scan">&#8635;</button>
    </div>
  </div>
  <div id="loading">Scanning colors...</div>
  <div id="content" style="display:none">
    <div id="palette" class="palette"></div>
    <div class="actions">
      <button id="copy-all">Copy All Colors</button>
      <button id="copy-css">Copy as CSS Variables</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
