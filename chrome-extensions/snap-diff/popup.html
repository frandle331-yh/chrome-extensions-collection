<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Main View -->
  <div id="main-view">
    <div class="header">
      <h1>SnapDiff</h1>
      <button id="capture" class="capture-btn">&#128247; Capture</button>
    </div>
    <div id="snapshots"></div>
    <div id="empty" class="empty-state">
      <p>No snapshots yet</p>
      <p class="sub">Capture a baseline screenshot of any page, then compare it later to spot visual changes.</p>
    </div>
  </div>

  <!-- Compare View -->
  <div id="compare-view" style="display:none">
    <div class="header">
      <button id="compare-back" class="back-btn">&larr;</button>
      <span class="header-title">Compare</span>
      <select id="compare-mode">
        <option value="diff">Diff Overlay</option>
        <option value="side">Side by Side</option>
        <option value="slider">Slider</option>
      </select>
    </div>
    <div id="diff-stats" class="diff-stats"></div>
    <div id="compare-container" class="compare-container"></div>
  </div>

  <div style="padding:6px 14px;text-align:center;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;display:flex;justify-content:center;gap:12px;">
    <a href="https://buymeacoffee.com/frandle331" target="_blank" style="color:#f43f5e;text-decoration:none;font-weight:600;">Support the developer</a>
    <button id="upgrade-btn" style="background:#f43f5e;color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;cursor:pointer;">Upgrade to Pro</button>
  </div>
  <script src="ExtPay.js"></script>
  <script src="popup.js"></script>
</body>
</html>
