<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>ColorPeek</h1>
    <div class="header-actions">
      <select id="format">
        <option value="hex">HEX</option>
        <option value="rgb">RGB</option>
        <option value="hsl">HSL</option>
      </select>
      <button id="refresh" title="Re-scan">&#8635;</button>
    </div>
  </div>
  <div id="loading">Scanning colors...</div>
  <div id="content" style="display:none">
    <div id="palette" class="palette"></div>
    <div class="actions">
      <button id="copy-all">Copy All Colors</button>
      <button id="copy-css">Copy as CSS Variables</button>
    </div>
  </div>
  <div style="padding:6px 14px;text-align:center;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;">
    <a href="https://buymeacoffee.com/frandle331" target="_blank" style="color:#ec4899;text-decoration:none;font-weight:600;">Support the developer</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
